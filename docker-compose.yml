services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://aipmo:aipmo@database:5432/aipmo
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      API_KEY: ${API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-60}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      - database
    command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"

  database:
    image: postgres:16
    environment:
      POSTGRES_DB: aipmo
      POSTGRES_USER: aipmo
      POSTGRES_PASSWORD: aipmo
    ports:
      - "5432:5432"
    volumes:
      - aipmo_postgres_data:/var/lib/postgresql/data

volumes:
  aipmo_postgres_data:
