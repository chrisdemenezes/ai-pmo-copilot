version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

  database:
    image: postgres:16
    environment:
      POSTGRES_DB: aipmo
      POSTGRES_USER: aipmo
      POSTGRES_PASSWORD: aipmo
    ports:
      - "5432:5432"
